<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Foundry Showcase</title>
    <script src="https://alcdn.msauth.net/browser/2.38.4/js/msal-browser.min.js"></script>
    <style>
      :root { color-scheme: light dark; font-family: "Segoe UI", sans-serif; }
      body { margin: 0; background: #f5f5f5; color: #242424; }
      main { width: min(880px, calc(100vw - 32px)); margin: 24px auto; }
      header, #chat, form, #status { background: white; border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
      h1 { margin: 0 0 6px; font-size: 1.3rem; }
      p { margin: 0; color: #666; }
      #chat { min-height: 360px; }
      .message { max-width: 78%; padding: 10px 12px; margin: 8px 0; border-radius: 10px; background: #eee; white-space: pre-wrap; }
      .user { margin-left: auto; background: #dcecff; }
      form { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
      textarea { min-height: 54px; padding: 10px; font: inherit; }
      button { padding: 0 18px; border: 0; border-radius: 8px; background: #0078d4; color: white; font-weight: 600; }
      button:disabled { opacity: .6; }
      #status { color: #555; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Foundry support operations</h1>
        <p>Entra-authenticated AG-UI through a secretless managed-identity gateway.</p>
      </header>
      <section id="chat" aria-live="polite"></section>
      <form id="form">
        <textarea id="prompt" placeholder="Ask the support agent" required></textarea>
        <button id="send" type="submit">Send</button>
      </form>
      <div id="status">Signing in...</div>
    </main>
    <script type="module">
      const config = await fetch("/config").then((response) => response.json());
      const msalClient = new msal.PublicClientApplication({
        auth: {
          clientId: config.clientId,
          authority: `https://login.microsoftonline.com/${config.tenantId}`,
          redirectUri: window.location.origin,
        },
        cache: { cacheLocation: "sessionStorage" },
      });
      const login = await msalClient.loginPopup({ scopes: [config.scope] });
      const account = login.account;
      const messages = [];
      const threadId = crypto.randomUUID();
      document.querySelector("#status").textContent = `Signed in as ${account.username}`;

      function bubble(role, text) {
        const element = document.createElement("div");
        element.className = `message ${role}`;
        element.textContent = text;
        document.querySelector("#chat").appendChild(element);
        return element;
      }

      document.querySelector("#form").addEventListener("submit", async (event) => {
        event.preventDefault();
        const prompt = document.querySelector("#prompt");
        const send = document.querySelector("#send");
        const content = prompt.value.trim();
        if (!content) return;
        prompt.value = "";
        send.disabled = true;
        bubble("user", content);
        messages.push({ id: crypto.randomUUID(), role: "user", content });
        const assistant = bubble("assistant", "");
        try {
          const auth = await msalClient.acquireTokenSilent({ account, scopes: [config.scope] });
          const response = await fetch("/agui", {
            method: "POST",
            headers: {
              Accept: "text/event-stream",
              Authorization: `Bearer ${auth.accessToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              threadId,
              runId: crypto.randomUUID(),
              messages,
            }),
          });
          if (!response.ok || !response.body) throw new Error(`HTTP ${response.status}`);
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          let text = "";
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split("\n");
            buffer = lines.pop() || "";
            for (const line of lines) {
              if (!line.startsWith("data:")) continue;
              const item = JSON.parse(line.slice(5).trim());
              if (item.type === "TEXT_MESSAGE_CONTENT") {
                text += item.delta || "";
                assistant.textContent = text;
              }
              if (item.type === "RUN_ERROR") throw new Error(item.message);
            }
          }
          messages.push({ id: crypto.randomUUID(), role: "assistant", content: text });
        } catch (error) {
          assistant.textContent = `Error: ${error.message}`;
        } finally {
          send.disabled = false;
        }
      });
    </script>
  </body>
</html>
