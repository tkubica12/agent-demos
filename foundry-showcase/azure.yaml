# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=1.0.0-beta.5'
name: foundry-showcase
services:
    foundry-showcase-main:
        project: main-agent
        host: azure.ai.agent
        language: python
        codeConfiguration:
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        description: Support operations showcase using Microsoft Agent Framework, Foundry Memory, governed Toolbox tools and skills, observability, and evaluations.
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: gpt-5.4-mini
            - name: MEMORY_STORE_NAME
              value: foundry-showcase-main
            - name: MEMORY_UPDATE_DELAY_SECONDS
              value: "1"
            - name: MEMORY_DEFAULT_USER_ID
              value: playground-user
            - name: MEMORY_STORE_PATH
              value: /files/foundry-showcase-memory-store.json
            - name: WORKFLOW_CHECKPOINT_DIR
              value: /files/foundry-showcase-workflows
            - name: TOOLBOX_NAME
              value: foundry-showcase-support
            - name: TOOLBOX_ENDPOINT
              value: ${TOOLBOX_ENDPOINT}
            - name: POLICY_TOOLBOX_NAME
              value: foundry-showcase-policy-tools
            - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT
              value: SPAN_AND_EVENT
            - name: OTEL_SEMCONV_STABILITY_OPT_IN
              value: gen_ai_latest_experimental
            - name: AZURE_EXPERIMENTAL_ENABLE_GENAI_TRACING
              value: "true"
        kind: hosted
        metadata:
            tags:
                - Microsoft Agent Framework
                - Foundry Hosted Agent
                - Responses Protocol
                - Invocations Protocol
                - Foundry Toolbox
                - Foundry Memory
                - Foundry IQ
                - Sequential Workflow
                - A2A Delegation
        name: foundry-showcase-main
        protocols:
            - protocol: responses
              version: 2.0.0
            - protocol: invocations
              version: 1.0.0
    foundry-showcase-policy-helper:
        project: policy-helper
        host: azure.ai.agent
        language: python
        codeConfiguration:
            entryPoint: main.py
            runtime: python_3_13
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        description: Bounded read-only LangGraph support-case policy helper exposed through Foundry A2A.
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: gpt-5.4-mini
        kind: hosted
        metadata:
            tags:
                - LangGraph
                - Foundry Hosted Agent
                - Responses Protocol
                - A2A
                - Read Only
        name: foundry-showcase-policy-helper
        protocols:
            - protocol: responses
              version: 2.0.0
