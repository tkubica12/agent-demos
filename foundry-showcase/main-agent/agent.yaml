# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: foundry-showcase-main
description: Support operations showcase using Microsoft Agent Framework, Foundry Memory, Agent Skills, observability, and evaluations.
metadata:
    tags:
        - Microsoft Agent Framework
        - Foundry Hosted Agent
        - Responses Protocol
        - Invocations Protocol
        - Support Operations
        - Observability
        - Evaluations
        - Memory
        - User Profile
        - Agent Skills
protocols:
    - protocol: responses
      version: 2.0.0
    - protocol: invocations
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-5.4-mini
    - name: MEMORY_STORE_NAME
      value: foundry-showcase-main
    - name: MEMORY_UPDATE_DELAY_SECONDS
      value: "1"
    - name: MEMORY_DEFAULT_USER_ID
      value: playground-user
    - name: MEMORY_STORE_PATH
      value: /files/foundry-showcase-memory-store.json
    - name: LOCAL_SKILLS_PATH
      value: /app/skills/base
code_configuration:
    runtime: python_3_13
    entry_point: main.py
    dependency_resolution: remote_build
