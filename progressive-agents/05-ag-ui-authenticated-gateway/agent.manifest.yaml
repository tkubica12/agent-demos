name: step-05-ag-ui-authenticated-gateway
description: Microsoft Agent Framework hosted agent behind an authenticated AG-UI gateway.
metadata:
  tags:
    - Microsoft Agent Framework
    - Foundry Hosted Agent
    - Responses Protocol
    - Invocations Protocol
    - Authenticated AG-UI Gateway
template:
  name: step-05-ag-ui-authenticated-gateway
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
    - protocol: invocations
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-5.4-mini
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
