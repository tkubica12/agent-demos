# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: step-01-foundry-responses-baseline
description: Minimal Microsoft Agent Framework agent exposed through the Foundry Hosted Agent Responses protocol.
metadata:
  tags:
    - Microsoft Agent Framework
    - Foundry Hosted Agent
    - Responses Protocol
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: "0.5"
  memory: 1Gi
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: gpt-5.4-mini
code_configuration:
  runtime: python_3_13
  entry_point: main.py
  dependency_resolution: remote_build
