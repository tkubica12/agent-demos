name: step-03-a2a-enabled-responses-agent
description: Microsoft Agent Framework hosted agent with Responses, Invocations, and Foundry-managed incoming A2A.
metadata:
  tags:
    - Microsoft Agent Framework
    - Foundry Hosted Agent
    - Responses Protocol
    - Invocations Protocol
    - A2A
    - Incoming A2A
template:
  name: step-03-a2a-enabled-responses-agent
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
    - protocol: invocations
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-5.4-mini
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
