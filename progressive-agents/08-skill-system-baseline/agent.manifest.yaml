name: step-08-skill-system-baseline
description: Microsoft Agent Framework hosted agent with Agent Skills, user profile, raw history, summaries, recall, and audit.
metadata:
  tags:
    - Microsoft Agent Framework
    - Foundry Hosted Agent
    - Responses Protocol
    - Invocations Protocol
    - Authenticated AG-UI Gateway
    - Observability
    - Evaluations
    - Memory
    - User Profile
    - Agent Skills
template:
  name: step-08-skill-system-baseline
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
    - protocol: invocations
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-5.4-mini
    - name: MEMORY_STORE_NAME
      value: step-08-skill-system-baseline
    - name: MEMORY_UPDATE_DELAY_SECONDS
      value: "1"
    - name: MEMORY_DEFAULT_USER_ID
      value: playground-user
    - name: MEMORY_STORE_PATH
      value: /files/step-08-memory-store.json
    - name: LOCAL_SKILLS_PATH
      value: /app/skills/base
resources:
  - kind: model
    id: gpt-5.4-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: model
    id: text-embedding-3-large
    name: MEMORY_STORE_EMBEDDING_MODEL_DEPLOYMENT_NAME
